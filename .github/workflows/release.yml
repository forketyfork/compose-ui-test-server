name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate version matches tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          GRADLE_VERSION=$(grep -oP 'version\s*=\s*"\K[^"]+' build.gradle.kts)
          if [ "$TAG_VERSION" != "$GRADLE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match build.gradle.kts version ($GRADLE_VERSION)"
            exit 1
          fi
          echo "Version validated: $TAG_VERSION"

      - name: Build
        run: ./gradlew build

      - name: Debug signing key format
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          echo "Key length: ${#SIGNING_KEY}"
          echo "First 50 chars: ${SIGNING_KEY:0:50}"
          echo "Last 20 chars: ${SIGNING_KEY: -20}"
          if [[ "$SIGNING_KEY" == *"BEGIN PGP"* ]]; then
            echo "Key contains PGP header (raw armor format)"
          else
            echo "Key does NOT contain PGP header (possibly base64 or stripped)"
          fi
          if [[ "$SIGNING_KEY" == *$'\n'* ]]; then
            echo "Key contains newlines"
          else
            echo "Key has no newlines (single line)"
          fi

      - name: Publish to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache --info
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/libs/*.jar
